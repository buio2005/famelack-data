name: Merge Category JSONs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Merge JSON files
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const dir = 'tv/raw/categories';
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.json') && f !== 'all.json');
            let merged = [];
            for (const file of files) {
              const data = JSON.parse(fs.readFileSync(path.join(dir, file), 'utf-8'));
              if (Array.isArray(data)) merged.push(...data);
            }
            fs.writeFileSync(path.join(dir, 'all.json'), JSON.stringify(merged, null, 2));
            console.log('✅ all.json aggiornato con', merged.length, 'canali');
          "

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tv/raw/categories/all.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-update all.json from category files"
          git push